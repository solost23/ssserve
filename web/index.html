<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 1.4rem; font-weight: 600; color: #111; }
  h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: #333; }

  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: white; border-radius: 8px; padding: 32px; width: 340px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .login-box h1 { text-align: center; margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: .85rem; color: #555; margin-bottom: 4px; }
  input[type=text], input[type=password], input[type=number] {
    width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px;
    font-size: .9rem; outline: none; transition: border .15s;
  }
  input:focus { border-color: #2563eb; }

  button {
    cursor: pointer; border: none; border-radius: 4px; padding: 8px 16px;
    font-size: .875rem; font-weight: 500; transition: background .15s;
  }
  .btn-primary { background: #2563eb; color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-danger { background: #dc2626; color: white; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-ghost { background: transparent; color: #2563eb; padding: 4px 8px; }
  .btn-ghost:hover { background: #eff6ff; }
  .btn-full { width: 100%; padding: 10px; }

  .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

  .create-form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
  @media (max-width: 640px) { .create-form { grid-template-columns: 1fr; } }

  table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #e5e7eb; color: #555; font-weight: 600; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .75rem; font-weight: 500; }
  .badge-active { background: #dcfce7; color: #16a34a; }
  .badge-inactive { background: #fee2e2; color: #dc2626; }

  .sub-url { font-family: monospace; font-size: .78rem; color: #555; word-break: break-all; }
  .link-stack { display: grid; gap: 4px; }
  .link-row { display: flex; align-items: center; gap: 8px; }
  .link-label { font-size: .72rem; color: #777; text-transform: uppercase; letter-spacing: .02em; min-width: 54px; }
  .link-value { flex: 1; font-family: monospace; font-size: .78rem; color: #555; word-break: break-all; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: #111; color: white;
    padding: 10px 18px; border-radius: 6px; font-size: .875rem;
    opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }

  .error { color: #dc2626; font-size: .85rem; margin-top: 8px; }
  #main-screen { display: none; }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .user-label { font-size: .85rem; color: #555; }
  .tab-nav { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab-btn { background: transparent; color: #555; border-bottom: 2px solid transparent; border-radius: 0; padding: 6px 12px; }
  .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Subscription Manager</h1>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary btn-full" onclick="login()">Login</button>
    <div id="login-error" class="error"></div>
  </div>
</div>

<div id="main-screen">
  <div class="container">
    <div class="header-row">
      <h1>Subscription Manager</h1>
      <div class="header-actions">
        <span class="user-label" id="current-user"></span>
        <button class="btn-ghost" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="tab-nav" id="tab-nav">
      <button class="tab-btn active" onclick="switchTab('tokens')">Tokens</button>
      <button class="tab-btn" id="tab-admins-btn" onclick="switchTab('admins')" style="display:none">Admins</button>
    </div>

    <!-- Tokens tab -->
    <div class="tab-panel active" id="tab-tokens">
      <div class="card">
        <h2>Create Token</h2>
        <div class="create-form">
          <div class="form-group" style="margin:0">
            <label>Name</label>
            <input type="text" id="new-name" placeholder="e.g. iPhone">
          </div>
          <div class="form-group" style="margin:0">
            <label>Quota (GB, optional)</label>
            <input type="number" id="new-quota" placeholder="unlimited" min="1">
          </div>
          <div class="form-group" style="margin:0">
            <label>Expires (days, optional)</label>
            <input type="number" id="new-expires" placeholder="never" min="1">
          </div>
          <button class="btn-primary" onclick="createToken()">Create</button>
        </div>
        <div id="create-error" class="error"></div>
      </div>

      <div class="card">
        <h2>Tokens</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Traffic</th>
              <th>Created</th>
              <th>Expires</th>
              <th>Subscription URL</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="token-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Admins tab (owner only) -->
    <div class="tab-panel" id="tab-admins">
      <div class="card">
        <h2>Add Admin</h2>
        <div class="create-form">
          <div class="form-group" style="margin:0">
            <label>Username</label>
            <input type="text" id="new-admin-user" placeholder="username">
          </div>
          <div class="form-group" style="margin:0">
            <label>Password</label>
            <input type="password" id="new-admin-pass" placeholder="password">
          </div>
          <div></div>
          <button class="btn-primary" onclick="createAdmin()">Add</button>
        </div>
        <div id="admin-create-error" class="error"></div>
      </div>

      <div class="card">
        <h2>Admins</h2>
        <table>
          <thead>
            <tr><th>Username</th><th>Role</th><th>Created</th><th></th></tr>
          </thead>
          <tbody id="admin-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let jwtToken = '';
let isOwner = false;
let currentUser = '';

function getJWT() { return localStorage.getItem('jwt') || ''; }
function setJWT(t) { localStorage.setItem('jwt', t); jwtToken = t; }
function clearJWT() { localStorage.removeItem('jwt'); localStorage.removeItem('jwt_user'); localStorage.removeItem('jwt_owner'); jwtToken = ''; }

function apiFetch(path, opts = {}) {
  return fetch(path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + getJWT(),
      ...(opts.headers || {}),
    },
  });
}

async function login() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Enter username and password.'; return; }

  const res = await fetch('/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password }),
  });
  if (!res.ok) { errEl.textContent = 'Invalid credentials.'; return; }

  const data = await res.json();
  setJWT(data.token);
  localStorage.setItem('jwt_user', data.username);
  localStorage.setItem('jwt_owner', data.is_owner ? '1' : '0');
  isOwner = data.is_owner;
  currentUser = data.username;
  showMain();
  loadTokens();
  if (isOwner) loadAdmins();
}

function logout() {
  clearJWT();
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
}

function showMain() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('current-user').textContent = currentUser;
  document.getElementById('tab-admins-btn').style.display = isOwner ? '' : 'none';
}

function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

// --- tokens ---

async function loadTokens() {
  const res = await apiFetch('/admin/tokens');
  if (res.status === 401) { logout(); return; }
  if (!res.ok) return;
  renderTokens((await res.json()) || []);
}

function fmtBytes(bytes) {
  if (!bytes) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB'];
  let i = 0, v = bytes;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return v.toFixed(1) + ' ' + units[i];
}

function fmtDate(s) { return s ? s.slice(0, 10) : '—'; }

function renderTokens(tokens) {
  const tbody = document.getElementById('token-tbody');
  if (!tokens.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;padding:24px">No tokens yet</td></tr>';
    return;
  }
  tbody.innerHTML = tokens.map(t => {
    const overQuota = t.quota_gb && t.used_bytes >= t.quota_gb * 1e9;
    const quotaLabel = t.quota_gb ? `${t.quota_gb} GB` : '∞';
    const usedPct = t.quota_gb ? Math.min(100, t.used_bytes / (t.quota_gb * 1e9) * 100) : 0;
    let statusClass, statusText;
    if (!t.active)        { statusClass = 'badge-inactive'; statusText = 'Deleted'; }
    else if (t.suspended) { statusClass = 'badge-inactive'; statusText = 'Suspended'; }
    else                  { statusClass = 'badge-active';   statusText = 'Active'; }
    const trafficCell = `
      <div style="min-width:130px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:${t.quota_gb?3:0}px">
          <span style="font-size:.8rem">${fmtBytes(t.used_bytes)} / ${quotaLabel}</span>
          ${t.active ? `<button class="btn-ghost" style="padding:1px 5px;font-size:.72rem" onclick="editQuota('${t.token}',${t.quota_gb??'null'})">edit</button>` : ''}
        </div>
        ${t.quota_gb ? `<div style="height:4px;background:#e5e7eb;border-radius:2px">
          <div style="height:4px;width:${usedPct}%;background:${overQuota?'#dc2626':'#2563eb'};border-radius:2px"></div>
        </div>` : ''}
      </div>`;
    return `<tr>
      <td><strong>${esc(t.name)}</strong><br><span style="font-family:monospace;font-size:.75rem;color:#999">:${t.server_port}</span></td>
      <td><span class="badge ${statusClass}">${statusText}</span></td>
      <td>${trafficCell}</td>
      <td>${fmtDate(t.created_at)}</td>
      <td>${fmtDate(t.expires_at)}</td>
      <td>
        <div class="link-stack">
          <div class="link-row">
            <span class="link-label">Clash</span>
            <span class="link-value">${esc(t.clash_url || t.sub_url)}</span>
            <button class="btn-ghost" onclick="copyURL('${esc(t.clash_url || t.sub_url)}')">Copy</button>
          </div>
          <div class="link-row">
            <span class="link-label">SS</span>
            <span class="link-value">${esc(t.ss_url || '')}</span>
            <button class="btn-ghost" onclick="copyURL('${esc(t.ss_url || '')}')">Copy</button>
          </div>
        </div>
      </td>
      <td style="white-space:nowrap">
        <button class="btn-danger" style="padding:4px 10px;font-size:.8rem" onclick="deleteToken('${t.token}')">Delete</button>
      </td>
    </tr>`;
  }).join('');
}

async function editQuota(token, current) {
  const val = prompt('Set quota in GB (leave empty for unlimited):', current != null ? String(current) : '');
  if (val === null) return;
  const quotaGB = val.trim() === '' ? null : parseFloat(val);
  if (quotaGB !== null && (isNaN(quotaGB) || quotaGB <= 0)) { toast('Invalid quota value.'); return; }
  const res = await apiFetch('/admin/tokens/' + token, {
    method: 'PATCH',
    body: JSON.stringify({ quota_gb: quotaGB }),
  });
  if (!res.ok) { toast('Failed to update quota.'); return; }
  toast('Quota updated.');
  loadTokens();
}

async function createToken() {
  const name = document.getElementById('new-name').value.trim();
  const quota = document.getElementById('new-quota').value;
  const expires = document.getElementById('new-expires').value;
  const errEl = document.getElementById('create-error');
  errEl.textContent = '';
  if (!name) { errEl.textContent = 'Name is required.'; return; }

  const body = { name };
  if (quota) body.quota_gb = parseFloat(quota);
  if (expires) body.expires_days = parseInt(expires);

  const res = await apiFetch('/admin/tokens', { method: 'POST', body: JSON.stringify(body) });
  if (!res.ok) { errEl.textContent = 'Failed to create token.'; return; }
  const data = await res.json();
  document.getElementById('new-name').value = '';
  document.getElementById('new-quota').value = '';
  document.getElementById('new-expires').value = '';
  toast('Created! URL copied.');
  copyURL(data.clash_url || data.sub_url);
  loadTokens();
}

async function deleteToken(token) {
  if (!confirm('Delete this token? The subscription will stop working immediately.')) return;
  const res = await apiFetch('/admin/tokens/' + token, { method: 'DELETE' });
  if (!res.ok) { toast('Failed to delete.'); return; }
  toast('Deleted.');
  loadTokens();
}

// --- admins (owner only) ---

async function loadAdmins() {
  const res = await apiFetch('/admin/admins');
  if (!res.ok) return;
  renderAdmins((await res.json()) || []);
}

function renderAdmins(admins) {
  const tbody = document.getElementById('admin-tbody');
  if (!admins.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999;padding:24px">No admins</td></tr>';
    return;
  }
  tbody.innerHTML = admins.map(a => `<tr>
    <td>${esc(a.username)}</td>
    <td><span class="badge ${a.is_owner?'badge-active':'badge-inactive'}">${a.is_owner?'Owner':'Admin'}</span></td>
    <td>${fmtDate(a.created_at)}</td>
    <td>${a.is_owner ? '' : `<button class="btn-danger" style="padding:4px 10px;font-size:.8rem" onclick="deleteAdmin('${esc(a.username)}')">Delete</button>`}</td>
  </tr>`).join('');
}

async function createAdmin() {
  const username = document.getElementById('new-admin-user').value.trim();
  const password = document.getElementById('new-admin-pass').value;
  const errEl = document.getElementById('admin-create-error');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Username and password are required.'; return; }
  const res = await apiFetch('/admin/admins', {
    method: 'POST',
    body: JSON.stringify({ username, password }),
  });
  if (!res.ok) { errEl.textContent = 'Failed to create admin.'; return; }
  document.getElementById('new-admin-user').value = '';
  document.getElementById('new-admin-pass').value = '';
  toast('Admin created.');
  loadAdmins();
}

async function deleteAdmin(username) {
  if (!confirm(`Delete admin "${username}"?`)) return;
  const res = await apiFetch('/admin/admins/' + encodeURIComponent(username), { method: 'DELETE' });
  if (!res.ok) { toast('Failed to delete admin.'); return; }
  toast('Admin deleted.');
  loadAdmins();
}

// --- utils ---

function copyURL(url) {
  navigator.clipboard.writeText(url)
    .then(() => toast('Copied!'))
    .catch(() => {
      const el = document.createElement('textarea');
      el.value = url; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
      toast('Copied!');
    });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

['login-username', 'login-password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
});

// auto-restore session
const savedJWT = getJWT();
if (savedJWT) {
  jwtToken = savedJWT;
  currentUser = localStorage.getItem('jwt_user') || '';
  isOwner = localStorage.getItem('jwt_owner') === '1';
  showMain();
  loadTokens();
  if (isOwner) loadAdmins();
}
</script>
</body>
</html>
