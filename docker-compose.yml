services:
    nginx:
      build:
        context: ./web/front
        dockerfile: Dockerfile
      container_name: nginx-sub
      restart: always
      ports:
        - "80:80"
      volumes:
        - ./config/${NGINX_CONF:-nginx.conf}:/etc/nginx/conf.d/default.conf:ro
        - ./logs/nginx:/var/log/nginx
        - ./certbot/www:/var/www/certbot:ro
        - ./certbot/conf:/etc/letsencrypt:ro
      depends_on:
        - subserver

    xray:
      image: ${XRAY_IMAGE:-ghcr.io/xtls/xray-core:v1.260327.0}
      container_name: xray
      restart: always
      ports:
        - "${XRAY_PORT:-443}:${XRAY_PORT:-443}/tcp"
      expose:
        - "10085"
      volumes:
        - ./config/xray.json:/etc/xray/config.json:ro
        - ./certbot/conf:/etc/letsencrypt:ro
      environment:
        XRAY_LOCATION_ASSET: /usr/local/share/xray
      command: ["run", "-config", "/etc/xray/config.json"]
      ulimits:
        nofile:
          soft: 1048576
          hard: 1048576
      healthcheck:
        test: ["CMD", "xray", "api", "statsquery", "--server=127.0.0.1:10085", "-pattern", "user>>>"]
        interval: 5s
        timeout: 3s
        retries: 12
        start_period: 5s
      logging:
        driver: json-file
        options:
          max-size: "10m"
          max-file: "5"

    subserver:
      build: ./web/server
      container_name: subserver
      restart: always
      environment:
        SERVER_ADDR: ${SERVER_ADDR}
        NODE_NAME: ${NODE_NAME:-Tokyo}
        XRAY_PORT: ${XRAY_PORT:-443}
        XRAY_API_ADDR: ${XRAY_API_ADDR:-xray:10085}
        XRAY_INBOUND_TAG: ${XRAY_INBOUND_TAG:-vless-in}
        XRAY_FULL_SYNC_INTERVAL: ${XRAY_FULL_SYNC_INTERVAL:-10m}
        XRAY_PUBLIC_KEY: ${XRAY_PUBLIC_KEY}
        XRAY_SHORT_ID: ${XRAY_SHORT_ID}
        XRAY_SERVER_NAME: ${XRAY_SERVER_NAME}
        ADMIN_SECRET: ${ADMIN_SECRET}
        DB_PATH: /data/sub.db
      volumes:
        - ./data:/data
      expose:
        - "8080"
      depends_on:
        xray:
          condition: service_healthy
      logging:
        driver: json-file
        options:
          max-size: "10m"
          max-file: "5"
