services:
    nginx:
      build:
        context: ./web/front
        dockerfile: Dockerfile
      container_name: nginx-sub
      restart: always
      ports:
        - "80:80"
        - "443:443"
      volumes:
        - ./config/${NGINX_CONF:-nginx.conf}:/etc/nginx/conf.d/default.conf:ro
        - ./logs/nginx:/var/log/nginx
        - ./certbot/www:/var/www/certbot:ro
        - ./certbot/conf:/etc/letsencrypt:ro
      depends_on:
        - subserver

    ssserver:
      build: ./ssmanager
      container_name: ssserver
      restart: always
      ports:
        - "${SS_USER_PORT_START:-40200}-${SS_USER_PORT_END:-40299}:${SS_USER_PORT_START:-40200}-${SS_USER_PORT_END:-40299}/tcp"
        - "${SS_USER_PORT_START:-40200}-${SS_USER_PORT_END:-40299}:${SS_USER_PORT_START:-40200}-${SS_USER_PORT_END:-40299}/udp"
      expose:
        - "6001/udp"
      volumes:
        - ./config/config.json:/etc/shadowsocks-rust/config.json:ro
      environment:
        RUST_LOG: warn
      ulimits:
        nofile:
          soft: 65535
          hard: 65535
      healthcheck:
        test: ["CMD-SHELL", "echo ping | nc -u -w1 127.0.0.1 6001 | grep -q stat"]
        interval: 5s
        timeout: 3s
        retries: 12
        start_period: 5s
      logging:
        driver: json-file
        options:
          max-size: "10m"
          max-file: "5"

    subserver:
      build: ./web/server
      container_name: subserver
      restart: always
      environment:
        SERVER_ADDR: ${SERVER_ADDR}
        SS_CIPHER: ${SS_CIPHER:-chacha20-ietf-poly1305}
        SS_NAME: ${SS_NAME:-Tokyo}
        SS_USER_PORT_START: ${SS_USER_PORT_START:-40200}
        ADMIN_SECRET: ${ADMIN_SECRET}
        MANAGER_ADDR: ${MANAGER_ADDR:-ssserver:6001}
        DB_PATH: /data/sub.db
      volumes:
        - ./data:/data
      expose:
        - "8080"
      depends_on:
        ssserver:
          condition: service_healthy
      logging:
        driver: json-file
        options:
          max-size: "10m"
          max-file: "5"
