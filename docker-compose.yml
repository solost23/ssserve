services:
    nginx:
      image: nginx:alpine
      container_name: nginx-sub
      restart: always
      ports:
        - "80:80"
        - "443:443"
      volumes:
        - ./config/${NGINX_CONF:-nginx.conf}:/etc/nginx/conf.d/default.conf:ro
        - ./config/subscribe:/etc/nginx/subscribe:ro
        - ./certbot/www:/var/www/certbot:ro
        - ./certbot/conf:/etc/letsencrypt:ro
        - ./logs/nginx:/var/log/nginx

    ssserver:
      image: ghcr.io/shadowsocks/ssserver-rust:latest
      container_name: ssserver
      restart: always
      ports:
        - "40105:40105/tcp"
        - "40105:40105/udp"
      volumes:
        - ./config/config.json:/etc/shadowsocks-rust/config.json:ro
      environment:
        RUST_LOG: warn
      logging:
        driver: json-file
        options:
          max-size: "10m"
          max-file: "5"
