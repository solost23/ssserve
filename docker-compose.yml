services:
    nginx:
      image: nginx:alpine
      container_name: nginx-sub
      restart: always
      ports:
        - "80:80"
        - "443:443"
      volumes:
        - ./config/${NGINX_CONF:-nginx.conf}:/etc/nginx/conf.d/default.conf:ro
        - ./web:/etc/nginx/web:ro
        - ./certbot/www:/var/www/certbot:ro
        - ./certbot/conf:/etc/letsencrypt:ro
        - ./logs/nginx:/var/log/nginx
      depends_on:
        - subserver

    certbot:
      image: certbot/certbot
      container_name: certbot
      restart: unless-stopped
      volumes:
        - ./certbot/www:/var/www/certbot
        - ./certbot/conf:/etc/letsencrypt
      entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

    ssserver:
      build: ./ssmanager
      container_name: ssserver
      restart: always
      ports:
        - "${SS_USER_PORT_START:-40200}-${SS_USER_PORT_END:-40299}:${SS_USER_PORT_START:-40200}-${SS_USER_PORT_END:-40299}/tcp"
        - "${SS_USER_PORT_START:-40200}-${SS_USER_PORT_END:-40299}:${SS_USER_PORT_START:-40200}-${SS_USER_PORT_END:-40299}/udp"
      expose:
        - "6001/udp"
      volumes:
        - ./config/config.json:/etc/shadowsocks-rust/config.json:ro
      environment:
        RUST_LOG: warn
      ulimits:
        nofile:
          soft: 65535
          hard: 65535
      logging:
        driver: json-file
        options:
          max-size: "10m"
          max-file: "5"

    subserver:
      build: ./server
      container_name: subserver
      restart: always
      environment:
        SS_DOMAIN: ${SS_DOMAIN}
        SS_CIPHER: ${SS_CIPHER:-aes-256-gcm}
        SS_NAME: ${SS_NAME:-Tokyo}
        SS_USER_PORT_START: ${SS_USER_PORT_START:-40200}
        ADMIN_SECRET: ${ADMIN_SECRET}
        MANAGER_ADDR: ${MANAGER_ADDR:-ssserver:6001}
        DB_PATH: /data/sub.db
      volumes:
        - ./data:/data
      expose:
        - "8080"
      depends_on:
        - ssserver
      logging:
        driver: json-file
        options:
          max-size: "10m"
          max-file: "5"
