services:
    ssserver:
      image: ghcr.io/shadowsocks/ssserver-rust:latest
      container_name: ssserver
      restart: always
      ports:
        - "8388:8388/tcp"
        - "8388:8388/udp"
      volumes:
        - ./config.json:/etc/shadowsocks-rust/config.json:ro
      environment:
        RUST_LOG: trace
      logging:
        driver: json-file
        options:
          max-size: "10m"
          max-file: "5"