mixed-port: 7890
allow-lan: false
mode: rule
log-level: info

proxies:
  - name: Shadowsocks
    type: ss
    server: example.com
    port: 40105
    cipher: aes-256-gcm
    password: "replace-with-a-long-random-password"
    udp: true

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - Shadowsocks
      - DIRECT

rules:
  - GEOIP,CN,DIRECT
  - MATCH,Proxy
