server {
    listen 8080;

    log_format debug_log '$remote_addr - "$request" $status $body_bytes_sent "$http_range" "$http_if_range" "$http_if_none_match"';
    access_log /var/log/nginx/access.log debug_log;

    location /sub/f18c843ba46a14a220efc197350179f0/ {
        root /etc/nginx;
        rewrite ^/sub/f18c843ba46a14a220efc197350179f0/(.*)$ /subscribe/$1 break;
        autoindex off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location / {
        return 404;
    }
}
